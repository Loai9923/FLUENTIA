<div class="website" [dir]="_direction">
  <mat-toolbar class="website__toolbar">
    <div class="website__toolbar-inner">
      <a class="brand" [routerLink]="['/main/home']">
        <span class="brand__name">FLUENTIA</span>
        <span class="brand__sub">ENGLISH ACADEMY</span>
      </a>

      <nav class="nav">
        <a routerLink="/main/about" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">About</a>
        <a routerLink="/main/levels" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">English Levels</a>
        <a routerLink="/main/placement-test" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Placement Test</a>
        <a routerLink="/main/how-it-works" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">How it works</a>
        <a routerLink="/main/pricing" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Schedule & Pricing</a>
        <a routerLink="/main/contact" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Contact</a>
      </nav>

      <div class="toolbar-actions">
        <app-change-language class="navbar-language"></app-change-language>
      </div>
    </div>
  </mat-toolbar>

  <main class="website__content">
    <router-outlet></router-outlet>
  </main>

  <footer class="website__footer">
    <div class="website__footer-inner">
      <div class="footer-brand">
        <div class="footer-brand__name">FLUENTIA</div>
        <div class="footer-brand__tagline">WHERE FLUENCY BECOMES NATURAL</div>
      </div>
      <div class="footer-copy">© 2026 Fluentia English Academy. All rights reserved.</div>
    </div>
  </footer>
</div>
